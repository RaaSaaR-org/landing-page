<?xml version="1.0" encoding="UTF-8"?>
<!--
  EmAI brand asset — Hazard-tape "Absperrband"

  Reusable across generators (flyer, visitenkarten). Renders at any aspect
  ratio thanks to preserveAspectRatio="xMidYMid slice": the SVG keeps its
  internal 15:1 proportions and crops whatever overflows the container.

  Internal viewBox is 360 × 24 units (mm-scale). Stripes are -45° at 16-unit
  pitch, then a light wear pass (scratches, scuffs, edge micro-notches) gives
  it a "used but professional" feel without going full grunge.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 360 24"
     preserveAspectRatio="xMidYMid slice"
     shape-rendering="geometricPrecision">
  <defs>
    <pattern id="emai-tape-stripes" x="0" y="0" width="22" height="22"
             patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <rect width="11" height="22" fill="#FF6700"/>
      <rect x="11" width="11" height="22" fill="#0A0A0A"/>
    </pattern>
  </defs>

  <!-- Base stripes -->
  <rect width="360" height="24" fill="url(#emai-tape-stripes)"/>

  <!-- Subtle bright scratches (sun-bleached fibers) -->
  <g stroke="#FFFFFF" stroke-linecap="round" fill="none">
    <line x1="22"  y1="6"  x2="58"  y2="6.6"  stroke-width="0.35" opacity="0.22"/>
    <line x1="80"  y1="14" x2="125" y2="15.2" stroke-width="0.28" opacity="0.16"/>
    <line x1="150" y1="4"  x2="195" y2="5"    stroke-width="0.45" opacity="0.20"/>
    <line x1="210" y1="18" x2="265" y2="19"   stroke-width="0.30" opacity="0.18"/>
    <line x1="285" y1="9"  x2="335" y2="10"   stroke-width="0.40" opacity="0.16"/>
    <line x1="45"  y1="20" x2="92"  y2="20.8" stroke-width="0.22" opacity="0.14"/>
    <line x1="170" y1="11" x2="208" y2="11.5" stroke-width="0.28" opacity="0.18"/>
  </g>

  <!-- Darker scuff streaks (rubbed adhesive / road grime) -->
  <g stroke="#000000" stroke-linecap="round" fill="none">
    <line x1="14"  y1="12" x2="40"  y2="13"   stroke-width="0.55" opacity="0.50"/>
    <line x1="100" y1="6"  x2="135" y2="7"    stroke-width="0.40" opacity="0.45"/>
    <line x1="180" y1="15" x2="220" y2="16"   stroke-width="0.50" opacity="0.55"/>
    <line x1="245" y1="3"  x2="295" y2="4"    stroke-width="0.50" opacity="0.48"/>
    <line x1="305" y1="20" x2="345" y2="21"   stroke-width="0.40" opacity="0.45"/>
    <line x1="60"  y1="17" x2="78"  y2="17.5" stroke-width="0.35" opacity="0.40"/>
  </g>

  <!-- Tiny grit specks scattered across -->
  <g fill="#0A0A0A" opacity="0.55">
    <circle cx="38"  cy="8"  r="0.35"/>
    <circle cx="92"  cy="19" r="0.45"/>
    <circle cx="148" cy="13" r="0.30"/>
    <circle cx="210" cy="7"  r="0.40"/>
    <circle cx="272" cy="16" r="0.35"/>
    <circle cx="318" cy="5"  r="0.30"/>
    <circle cx="58"  cy="12" r="0.25"/>
    <circle cx="115" cy="21" r="0.35"/>
    <circle cx="240" cy="11" r="0.30"/>
  </g>

  <!-- Edge micro-notches: top (faint torn-paper feel) -->
  <g fill="#0A0A0A" opacity="0.9">
    <polygon points="32,0 35,2 29,2"/>
    <polygon points="74,0 77,1.5 71,1.5"/>
    <polygon points="120,0 124,2.2 116,2.2"/>
    <polygon points="178,0 181,1.5 175,1.5"/>
    <polygon points="225,0 229,2 221,2"/>
    <polygon points="280,0 283,1.5 277,1.5"/>
    <polygon points="320,0 324,2 316,2"/>
  </g>

  <!-- Edge micro-notches: bottom -->
  <g fill="#0A0A0A" opacity="0.9">
    <polygon points="52,24 55,22 49,22"/>
    <polygon points="98,24 101,22.5 95,22.5"/>
    <polygon points="142,24 146,22 138,22"/>
    <polygon points="200,24 203,22.3 197,22.3"/>
    <polygon points="248,24 251,22.5 245,22.5"/>
    <polygon points="302,24 306,22 298,22"/>
    <polygon points="345,24 348,22.5 342,22.5"/>
  </g>

  <!-- Printed-edge orange hairlines top + bottom -->
  <rect width="360" height="0.4" fill="#FF6700"/>
  <rect y="23.6" width="360" height="0.4" fill="#FF6700"/>
</svg>
