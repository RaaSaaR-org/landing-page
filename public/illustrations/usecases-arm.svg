<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Cognitive robotics factory floor">
  <title>Use cases — factory floor with cognitive robots</title>

  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FF6700" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#FF6700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arm-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF6700"/>
      <stop offset="100%" stop-color="#FFA366"/>
    </linearGradient>
    <linearGradient id="body-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFA366"/>
      <stop offset="100%" stop-color="#993E00"/>
    </linearGradient>
    <radialGradient id="lamp-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFA366" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFA366" stop-opacity="0"/>
    </radialGradient>

    <!-- ============ HUMANOID COGNITIVE ROBOT ============ -->
    <!-- 28×80 footprint, anchored at feet (0,0) -->
    <g id="humanoid">
      <!-- Head -->
      <rect x="-7" y="-78" width="14" height="14" rx="3" fill="url(#body-grad)"/>
      <!-- Visor / sensor band -->
      <rect x="-5" y="-72" width="10" height="2.5" rx="0.5" fill="#2DD4BF"/>
      <!-- Small antenna -->
      <line x1="0" y1="-80" x2="0" y2="-84" stroke="#2DD4BF" stroke-width="1"/>
      <circle cx="0" cy="-85" r="0.8" fill="#2DD4BF"/>
      <!-- Neck -->
      <rect x="-2" y="-64" width="4" height="3" fill="#FF6700" opacity="0.7"/>
      <!-- Torso (rounded rect) -->
      <rect x="-9" y="-61" width="18" height="24" rx="3" fill="url(#body-grad)"/>
      <!-- Chest core indicator -->
      <circle cx="0" cy="-50" r="2.4" fill="#2DD4BF"/>
      <circle cx="0" cy="-50" r="4" fill="none" stroke="#2DD4BF" stroke-opacity="0.4" stroke-width="0.6"/>
      <!-- Shoulder joints -->
      <circle cx="-9" cy="-59" r="2" fill="#2DD4BF"/>
      <circle cx="9"  cy="-59" r="2" fill="#2DD4BF"/>
      <!-- Upper arms -->
      <line x1="-9" y1="-59" x2="-11" y2="-44" stroke="#FF6700" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="9"  y1="-59" x2="11"  y2="-44" stroke="#FF6700" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Elbow joints -->
      <circle cx="-11" cy="-44" r="1.6" fill="#2DD4BF"/>
      <circle cx="11"  cy="-44" r="1.6" fill="#2DD4BF"/>
      <!-- Forearms (slightly forward) -->
      <line x1="-11" y1="-44" x2="-9" y2="-29" stroke="#FF6700" stroke-width="3" stroke-linecap="round"/>
      <line x1="11"  y1="-44" x2="9"  y2="-29" stroke="#FF6700" stroke-width="3" stroke-linecap="round"/>
      <!-- Hands -->
      <circle cx="-9" cy="-28" r="2" fill="#2DD4BF"/>
      <circle cx="9"  cy="-28" r="2" fill="#2DD4BF"/>
      <!-- Hip plate -->
      <rect x="-8" y="-37" width="16" height="5" rx="1.5" fill="#993E00"/>
      <!-- Upper legs -->
      <line x1="-4" y1="-33" x2="-4" y2="-15" stroke="#FF6700" stroke-width="4" stroke-linecap="round"/>
      <line x1="4"  y1="-33" x2="4"  y2="-15" stroke="#FF6700" stroke-width="4" stroke-linecap="round"/>
      <!-- Knee joints -->
      <circle cx="-4" cy="-15" r="1.8" fill="#2DD4BF"/>
      <circle cx="4"  cy="-15" r="1.8" fill="#2DD4BF"/>
      <!-- Lower legs -->
      <line x1="-4" y1="-15" x2="-5" y2="-3" stroke="#FF6700" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="4"  y1="-15" x2="5"  y2="-3" stroke="#FF6700" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Feet -->
      <rect x="-9" y="-3" width="8"  height="3" rx="0.8" fill="#993E00"/>
      <rect x="1"  y="-3" width="8"  height="3" rx="0.8" fill="#993E00"/>
    </g>
  </defs>

  <rect width="400" height="400" fill="url(#halo)"/>

  <!-- Outer brand rings -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="#FF6700" stroke-opacity="0.15" stroke-width="1"/>
  <circle cx="200" cy="200" r="172" fill="none" stroke="#FF6700" stroke-opacity="0.25" stroke-width="1"/>

  <!-- HUD corners -->
  <g stroke="#FF6700" stroke-opacity="0.5" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M 20 36 L 20 20 L 36 20"/>
    <path d="M 364 20 L 380 20 L 380 36"/>
    <path d="M 380 364 L 380 380 L 364 380"/>
    <path d="M 36 380 L 20 380 L 20 364"/>
  </g>

  <!-- ============ TOP STATUS BAR ============ -->
  <g font-family="ui-monospace, Menlo, monospace" font-weight="700">
    <text x="44" y="50" font-size="9" fill="#78716C" letter-spacing="2.5">FACTORY · SECTOR-04</text>
    <text x="356" y="50" font-size="9" fill="#2DD4BF" text-anchor="end">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" repeatCount="indefinite"/>
      ● 3 UNITS LIVE
    </text>
  </g>

  <!-- ============ FACTORY CEILING (background) ============ -->
  <!-- Two horizontal beams -->
  <line x1="40" y1="105" x2="360" y2="105" stroke="#3D3D3D" stroke-width="1.2"/>
  <line x1="40" y1="115" x2="360" y2="115" stroke="#3D3D3D" stroke-width="0.6"/>
  <!-- Hanging lamp cords -->
  <g stroke="#3D3D3D" stroke-width="0.6">
    <line x1="110" y1="115" x2="110" y2="135"/>
    <line x1="200" y1="115" x2="200" y2="135"/>
    <line x1="290" y1="115" x2="290" y2="135"/>
  </g>
  <!-- Lamps with glow — staggered breathing -->
  <g>
    <circle cx="110" cy="148" r="22" fill="url(#lamp-glow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="110" cy="138" r="3.5" fill="#FFA366"/>
    <circle cx="200" cy="148" r="22" fill="url(#lamp-glow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" begin="-1.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="138" r="3.5" fill="#FFA366"/>
    <circle cx="290" cy="148" r="22" fill="url(#lamp-glow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" begin="-2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="290" cy="138" r="3.5" fill="#FFA366"/>
  </g>
  <!-- Pipe along ceiling -->
  <line x1="40" y1="92" x2="360" y2="92" stroke="#3D3D3D" stroke-width="2"/>
  <g fill="#2DD4BF" opacity="0.4">
    <circle cx="80"  cy="92" r="1.5"/>
    <circle cx="160" cy="92" r="1.5"/>
    <circle cx="240" cy="92" r="1.5"/>
    <circle cx="320" cy="92" r="1.5"/>
  </g>

  <!-- ============ FACTORY FLOOR (perspective grid) ============ -->
  <g stroke="#3D3D3D" stroke-width="0.5" opacity="0.55">
    <line x1="20"  y1="325" x2="380" y2="325"/>
    <line x1="40"  y1="305" x2="360" y2="305"/>
    <line x1="60"  y1="285" x2="340" y2="285"/>
    <line x1="80"  y1="265" x2="320" y2="265"/>
    <!-- Convergence lines -->
    <line x1="20"  y1="325" x2="80"  y2="265"/>
    <line x1="105" y1="325" x2="125" y2="265"/>
    <line x1="195" y1="325" x2="200" y2="265"/>
    <line x1="285" y1="325" x2="275" y2="265"/>
    <line x1="380" y1="325" x2="320" y2="265"/>
  </g>
  <!-- Front floor edge -->
  <line x1="20" y1="325" x2="380" y2="325" stroke="#A8A29E" stroke-width="0.8" opacity="0.5"/>

  <!-- ============ STATION 01: HUMANOID COGNITIVE ROBOT ============ -->
  <!-- Workstation platform -->
  <rect x="68" y="318" width="78" height="8" rx="1" fill="#1F1F1F" stroke="#3D3D3D" stroke-width="0.8"/>
  <text x="107" y="324" font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="5" fill="#78716C" text-anchor="middle" letter-spacing="0.8">UNIT-01</text>
  <!-- Humanoid robot — translated to its feet position, scaled larger -->
  <use href="#humanoid" transform="translate(107, 318) scale(1.4)"/>
  <!-- Scanning bracket around humanoid -->
  <g stroke="#FF6700" stroke-opacity="0.5" stroke-width="1" fill="none" stroke-linecap="round">
    <path d="M 72 200 L 72 208 M 72 200 L 80 200"/>
    <path d="M 142 200 L 134 200 M 142 200 L 142 208"/>
    <path d="M 142 310 L 142 302 M 142 310 L 134 310"/>
    <path d="M 72 310 L 80 310 M 72 310 L 72 302"/>
  </g>

  <!-- ============ STATION 02: CONVEYOR ============ -->
  <!-- Belt -->
  <rect x="156" y="312" width="88" height="10" rx="1.5" fill="#131313" stroke="#3D3D3D" stroke-width="0.8"/>
  <!-- Belt rollers (ends) -->
  <circle cx="159" cy="317" r="4" fill="#1F1F1F" stroke="#3D3D3D" stroke-width="0.6"/>
  <circle cx="241" cy="317" r="4" fill="#1F1F1F" stroke="#3D3D3D" stroke-width="0.6"/>
  <!-- Belt segment marks -->
  <g stroke="#3D3D3D" stroke-width="0.5">
    <line x1="170" y1="320" x2="172" y2="320"/>
    <line x1="180" y1="320" x2="182" y2="320"/>
    <line x1="190" y1="320" x2="192" y2="320"/>
    <line x1="200" y1="320" x2="202" y2="320"/>
    <line x1="210" y1="320" x2="212" y2="320"/>
    <line x1="220" y1="320" x2="222" y2="320"/>
    <line x1="230" y1="320" x2="232" y2="320"/>
  </g>
  <!-- Workpieces on belt — flowing right -->
  <rect x="168" y="304" width="10" height="10" rx="1" fill="#FF6700">
    <animate attributeName="x" values="168;238" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="168" y="304" width="10" height="10" rx="1" fill="#FF6700">
    <animate attributeName="x" values="168;238" dur="4s" begin="-1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" begin="-1s" repeatCount="indefinite"/>
  </rect>
  <rect x="168" y="304" width="10" height="10" rx="1" fill="#FF6700">
    <animate attributeName="x" values="168;238" dur="4s" begin="-2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" begin="-2s" repeatCount="indefinite"/>
  </rect>
  <rect x="168" y="304" width="10" height="10" rx="1" fill="#FF6700">
    <animate attributeName="x" values="168;238" dur="4s" begin="-3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" begin="-3s" repeatCount="indefinite"/>
  </rect>
  <!-- Belt direction arrow -->
  <g fill="#2DD4BF">
    <path d="M 252 317 L 258 314 L 256 317 L 258 320 Z"/>
  </g>
  <text x="200" y="334" font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="5" fill="#78716C" text-anchor="middle" letter-spacing="0.8">CONV-A → 142/h</text>

  <!-- ============ STATION 03: INDUSTRIAL ROBOT ARM ============ -->
  <!-- Base platform -->
  <rect x="252" y="318" width="78" height="8" rx="1" fill="#1F1F1F" stroke="#3D3D3D" stroke-width="0.8"/>
  <text x="291" y="324" font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="5" fill="#78716C" text-anchor="middle" letter-spacing="0.8">UNIT-02</text>
  <!-- Arm base -->
  <rect x="278" y="298" width="26" height="20" rx="2" fill="url(#arm-grad)"/>
  <text x="291" y="312" font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="4.5" fill="#0B0B0B" text-anchor="middle" letter-spacing="1">SO-101</text>
  <!-- Shoulder joint -->
  <circle cx="291" cy="298" r="5" fill="#2DD4BF"/>
  <!-- Upper arm -->
  <line x1="291" y1="298" x2="248" y2="240" stroke="url(#arm-grad)" stroke-width="9" stroke-linecap="round"/>
  <!-- Elbow joint -->
  <circle cx="248" cy="240" r="6" fill="#2DD4BF"/>
  <circle cx="248" cy="240" r="9" fill="none" stroke="#2DD4BF" stroke-opacity="0.4" stroke-width="0.7"/>
  <!-- Forearm -->
  <line x1="248" y1="240" x2="328" y2="208" stroke="url(#arm-grad)" stroke-width="7" stroke-linecap="round"/>
  <!-- Wrist joint -->
  <circle cx="328" cy="208" r="4.5" fill="#2DD4BF"/>
  <!-- Gripper fingers -->
  <g stroke="#2DD4BF" stroke-width="2" stroke-linecap="round">
    <line x1="328" y1="208" x2="340" y2="200"/>
    <line x1="328" y1="208" x2="340" y2="216"/>
  </g>
  <!-- Workpiece being grabbed -->
  <rect x="343" y="194" width="14" height="14" rx="1.5" fill="#1F1F1F" stroke="#2DD4BF" stroke-width="1.2"/>
  <!-- Targeting reticle -->
  <g stroke="#FF6700" stroke-opacity="0.7" stroke-width="1" fill="none" stroke-linecap="round">
    <path d="M 336 186 L 336 192 M 336 186 L 342 186"/>
    <path d="M 364 186 L 358 186 M 364 186 L 364 192"/>
    <path d="M 364 216 L 364 210 M 364 216 L 358 216"/>
    <path d="M 336 216 L 342 216 M 336 216 L 336 210"/>
  </g>

  <!-- ============ BOTTOM HUD READOUT ============ -->
  <g font-family="ui-monospace, Menlo, monospace" font-weight="700">
    <text x="60"  y="375" font-size="7.5" fill="#A8A29E" letter-spacing="1.5">OUTPUT 142/h</text>
    <text x="200" y="386" font-size="10" fill="#2DD4BF" text-anchor="middle" letter-spacing="3.5">PHYSICAL · AI · DEPLOYED</text>
    <text x="340" y="375" font-size="7.5" fill="#A8A29E" letter-spacing="1.5" text-anchor="end">UPTIME 99.4%</text>
  </g>
</svg>
