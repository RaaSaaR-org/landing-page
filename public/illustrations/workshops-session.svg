<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Workshop curriculum schedule">
  <title>Workshops — 4-tier curriculum schedule</title>

  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FF6700" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#FF6700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF6700"/>
      <stop offset="100%" stop-color="#FFA366"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#halo)"/>

  <!-- Outer brand rings -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="#FF6700" stroke-opacity="0.15" stroke-width="1"/>
  <circle cx="200" cy="200" r="172" fill="none" stroke="#FF6700" stroke-opacity="0.25" stroke-width="1"/>

  <!-- HUD corners -->
  <g stroke="#FF6700" stroke-opacity="0.5" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M 20 36 L 20 20 L 36 20"/>
    <path d="M 364 20 L 380 20 L 380 36"/>
    <path d="M 380 364 L 380 380 L 364 380"/>
    <path d="M 36 380 L 20 380 L 20 364"/>
  </g>

  <!-- ============ TOP STATUS BAR ============ -->
  <g font-family="ui-monospace, Menlo, monospace" font-weight="700">
    <text x="44" y="50" font-size="9" fill="#78716C" letter-spacing="2.5">CURRICULUM · 4 MODULES</text>
    <text x="356" y="50" font-size="9" fill="#2DD4BF" text-anchor="end">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" repeatCount="indefinite"/>
      ● ACTIVE
    </text>
  </g>

  <!-- ============ TIME-AXIS GRID ============ -->
  <!-- Faint vertical gridlines (days) -->
  <g stroke="#3D3D3D" stroke-width="0.4" opacity="0.6">
    <line x1="110" y1="100" x2="110" y2="290"/>
    <line x1="160" y1="100" x2="160" y2="290"/>
    <line x1="210" y1="100" x2="210" y2="290"/>
    <line x1="260" y1="100" x2="260" y2="290"/>
    <line x1="310" y1="100" x2="310" y2="290"/>
  </g>
  <!-- X-axis day labels (top) -->
  <g font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="6.5" fill="#78716C" text-anchor="middle" letter-spacing="1">
    <text x="110" y="92">1d</text>
    <text x="160" y="92">2d</text>
    <text x="210" y="92">3d</text>
    <text x="260" y="92">4d</text>
    <text x="310" y="92">5d+</text>
  </g>

  <!-- Bottom axis line -->
  <line x1="60" y1="290" x2="340" y2="290" stroke="#A8A29E" stroke-width="0.8" opacity="0.5"/>

  <!-- ============ MODULE BARS ============ -->
  <!-- Module 01 — Validierung (1d) — 60 to 110 -->
  <g>
    <text x="50" y="119" font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="9" fill="#FF6700" text-anchor="end" letter-spacing="1">01</text>
    <rect x="60" y="108" width="50" height="16" rx="2" fill="url(#bar-grad)"/>
    <text x="68" y="120" font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="8" fill="#0B0B0B" letter-spacing="1">VALIDIERUNG</text>
  </g>

  <!-- Connector tick -->
  <line x1="110" y1="124" x2="110" y2="148" stroke="#FF6700" stroke-width="0.8" opacity="0.4" stroke-dasharray="2 2"/>

  <!-- Module 02 — Strategie (1-2d) — 60 to 160 — ACTIVE -->
  <g>
    <text x="50" y="159" font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="9" fill="#FF6700" text-anchor="end" letter-spacing="1">02</text>
    <!-- Active glow halo -->
    <rect x="56" y="144" width="108" height="24" rx="3" fill="#2DD4BF" fill-opacity="0.10" stroke="#2DD4BF" stroke-opacity="0.5" stroke-width="0.8"/>
    <rect x="60" y="148" width="100" height="16" rx="2" fill="url(#bar-grad)"/>
    <text x="68" y="160" font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="8" fill="#0B0B0B" letter-spacing="1">STRATEGIE</text>
    <!-- ACTIVE pulse marker on the trailing edge — expanding ring -->
    <circle cx="160" cy="156" r="3.5" fill="#2DD4BF">
      <animate attributeName="r" values="3.5;5;3.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="156" r="6" fill="none" stroke="#2DD4BF" stroke-opacity="0.5" stroke-width="0.8">
      <animate attributeName="r" values="6;14;6" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="170" y="159" font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="7" fill="#2DD4BF" letter-spacing="1.5">ACTIVE</text>
  </g>

  <!-- Connector tick -->
  <line x1="160" y1="168" x2="160" y2="188" stroke="#FF6700" stroke-width="0.8" opacity="0.4" stroke-dasharray="2 2"/>

  <!-- Module 03 — Deep Dive (3-5d) — 60 to 310 -->
  <g>
    <text x="50" y="199" font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="9" fill="#FF6700" text-anchor="end" letter-spacing="1">03</text>
    <rect x="60" y="188" width="250" height="16" rx="2" fill="url(#bar-grad)"/>
    <text x="68" y="200" font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="8" fill="#0B0B0B" letter-spacing="1">DEEP DIVE · VLA FINE-TUNING</text>
  </g>

  <!-- Connector tick -->
  <line x1="310" y1="204" x2="310" y2="228" stroke="#FF6700" stroke-width="0.8" opacity="0.4" stroke-dasharray="2 2"/>

  <!-- Module 04 — Partner Network (ongoing) — 60 to 340 (dashed extension) -->
  <g>
    <text x="50" y="239" font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="9" fill="#FF6700" text-anchor="end" letter-spacing="1">04</text>
    <rect x="60" y="228" width="250" height="16" rx="2" fill="url(#bar-grad)"/>
    <text x="68" y="240" font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="8" fill="#0B0B0B" letter-spacing="1">PARTNER NETWORK</text>
    <!-- Continues indefinitely — dashed extension + arrow -->
    <line x1="310" y1="236" x2="338" y2="236" stroke="#FF6700" stroke-width="2.5" stroke-dasharray="3 3" stroke-linecap="round"/>
    <path d="M 338 232 L 346 236 L 338 240 Z" fill="#FF6700"/>
  </g>

  <!-- ============ OUTCOMES STRIP (below the chart) ============ -->
  <g font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="6.5" letter-spacing="1">
    <text x="50" y="312" fill="#78716C" text-anchor="end">OUT</text>
    <g transform="translate(60, 305)">
      <rect x="0"   y="0" width="58" height="12" rx="1.5" fill="#2DD4BF" fill-opacity="0.15" stroke="#2DD4BF" stroke-opacity="0.4" stroke-width="0.6"/>
      <text x="29" y="8.5" fill="#2DD4BF" text-anchor="middle">BACKLOG</text>

      <rect x="66"  y="0" width="58" height="12" rx="1.5" fill="#2DD4BF" fill-opacity="0.15" stroke="#2DD4BF" stroke-opacity="0.4" stroke-width="0.6"/>
      <text x="95" y="8.5" fill="#2DD4BF" text-anchor="middle">ROADMAP</text>

      <rect x="132" y="0" width="58" height="12" rx="1.5" fill="#2DD4BF" fill-opacity="0.15" stroke="#2DD4BF" stroke-opacity="0.4" stroke-width="0.6"/>
      <text x="161" y="8.5" fill="#2DD4BF" text-anchor="middle">VLA MODEL</text>

      <rect x="198" y="0" width="58" height="12" rx="1.5" fill="#2DD4BF" fill-opacity="0.15" stroke="#2DD4BF" stroke-opacity="0.4" stroke-width="0.6"/>
      <text x="227" y="8.5" fill="#2DD4BF" text-anchor="middle">PARTNERS</text>
    </g>
  </g>

  <!-- ============ BOTTOM FOOTER ============ -->
  <g font-family="ui-monospace, Menlo, monospace" font-weight="700">
    <text x="60"  y="375" font-size="7.5" fill="#A8A29E" letter-spacing="1.5">TIER 02 / 04</text>
    <text x="200" y="386" font-size="10" fill="#2DD4BF" text-anchor="middle" letter-spacing="3.5">CURRICULUM · WORKSHOP TIERS</text>
    <text x="340" y="375" font-size="7.5" fill="#A8A29E" letter-spacing="1.5" text-anchor="end">12 ENROLLED</text>
  </g>
</svg>
